kind = "web"
previewPath = "/"
title = "AttendanceIQ"
version = "1.0.0"
id = "artifacts/attendance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18763

[services.development]
run = "pnpm --filter @workspace/attendance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/attendance", "run", "build" ]
publicDir = "artifacts/attendance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18763"
BASE_PATH = "/"
